name = "getyoursitelive"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Workers deployment (not Pages) — OpenNext outputs a single worker
# which avoids the 25 MiB Pages Functions bundle limit.
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "getyoursitelive-db"
database_id = "966b62c5-1e11-4d97-a8c2-d99a9824983e"

[[r2_buckets]]
binding = "R2"
bucket_name = "getyoursitelive"
